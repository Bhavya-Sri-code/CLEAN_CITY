<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean City - Smart Waste Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 data-i18n="app_title">🌿 Clean City</h1>
                <p class="text-muted" data-i18n="app_subtitle">Smart Waste Management System</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-target="user-auth" data-i18n="tab_user">User</div>
                <div class="auth-tab" data-target="admin-auth" data-i18n="tab_admin">Admin</div>
                <div class="auth-tab" data-target="collector-auth" data-i18n="tab_collector">Collector</div>
            </div>

            <div class="auth-body">

                <!-- USER AUTH -->
                <div id="user-auth" class="auth-section">
                    <div id="user-login-form">
                        <form onsubmit="handleUserLogin(event)">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="user-login-email" class="form-control" required
                                    placeholder="Enter email">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="user-login-password" class="form-control" required
                                    placeholder="Enter password">
                            </div>
                            <button type="submit" class="btn btn-primary" data-i18n="login_btn">Login</button>
                            <p class="text-center mt-4 text-sm">
                                Don't have an account? <a href="#" onclick="toggleUserAuth('signup')">Sign up</a>
                            </p>
                        </form>
                    </div>

                    <div id="user-signup-form" style="display: none;">
                        <form onsubmit="handleUserSignup(event)">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="user-signup-name" class="form-control" required
                                    placeholder="Enter full name">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="user-signup-email" class="form-control" required
                                    placeholder="Enter email">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <select id="user-signup-city" class="form-control city-select" required>
                                    <option value="">Select City</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="user-signup-password" class="form-control" minlength="6"
                                    required placeholder="Create password">
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" id="user-signup-confirm" class="form-control" minlength="6"
                                    required placeholder="Confirm password">
                            </div>
                            <button type="submit" class="btn btn-primary" data-i18n="signup_btn">Sign Up</button>
                            <p class="text-center mt-4 text-sm">
                                Already have an account? <a href="#" onclick="toggleUserAuth('login')">Login</a>
                            </p>
                        </form>
                    </div>
                </div>

                <!-- ADMIN AUTH -->
                <div id="admin-auth" class="auth-section" style="display: none;">
                    <form onsubmit="handleAdminLogin(event)">
                        <div class="form-group">
                            <label>Admin Email</label>
                            <input type="email" id="admin-email" class="form-control" required
                                placeholder="admin.city@local.com">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <select id="admin-city" class="form-control city-select" required>
                                <option value="">Select City</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Registration Number (RegNo)</label>
                            <input type="text" id="admin-regno" class="form-control" required placeholder="e.g. HYD001">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="admin-password" class="form-control" required
                                placeholder="Admin@123">
                        </div>
                        <button type="submit" class="btn btn-primary" data-i18n="login_btn">Admin Login</button>
                    </form>
                </div>

                <!-- COLLECTOR AUTH -->
                <div id="collector-auth" class="auth-section" style="display: none;">
                    <form onsubmit="handleCollectorLogin(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="collector-email" class="form-control" required
                                placeholder="Collector email">
                        </div>
                        <div class="form-group">
                            <label>Unique Code</label>
                            <input type="text" id="collector-code" class="form-control" required
                                placeholder="e.g. COL-HYD-1001">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="collector-password" class="form-control" required
                                placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-primary" data-i18n="login_btn">Collector Login</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
